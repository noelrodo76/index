<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensor Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container { max-width: 420px; margin: 0 auto; }

  header { margin-bottom: 28px; }
  header h1 {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #e2e8f0, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { color: var(--muted); font-size: 13px; margin-top: 4px; font-family: 'Space Mono', monospace; }

  .btn {
    width: 100%; padding: 14px 20px; border-radius: 12px;
    border: 1px solid var(--border); font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-bottom: 12px;
  }
  .btn-connect { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-connect:hover { opacity: 0.85; }
  .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-disconnect { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-clear { background: transparent; color: var(--muted); border-color: var(--border); font-size: 13px; padding: 10px; }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 20px; font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
  .dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  .dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ALERTA BANNER */
  .alerta-banner {
    display: none;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 16px;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  .alerta-banner.aviso {
    display: block;
    background: rgba(245,158,11,0.15);
    border: 1px solid var(--warning);
    color: var(--warning);
  }
  .alerta-banner.peligro {
    display: block;
    background: rgba(239,68,68,0.15);
    border: 1px solid var(--danger);
    color: var(--danger);
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

  .section-title {
    font-size: 11px; font-family: 'Space Mono', monospace;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 10px; margin-top: 20px;
  }

  .live-value {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 12px;
    text-align: center; position: relative; overflow: hidden;
  }
  .live-value::before {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
  }
  .live-value.active::before { transform: scaleX(1); }
  .live-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .live-number { font-size: 52px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--text); line-height: 1; }
  .live-number.peak { color: var(--accent2); }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; text-align: center; }
  .stat-card.highlight { border-color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 800; color: var(--text); font-family: 'Space Mono', monospace; }
  .stat-card.highlight .stat-value { color: var(--accent2); }

  .desgaste-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; transition: border-color 0.3s; }
  .desgaste-card.aviso { border-color: var(--warning); }
  .desgaste-card.peligro { border-color: var(--danger); }
  .desgaste-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .desgaste-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .desgaste-val { font-size: 28px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--accent3); transition: color 0.3s; }
  .desgaste-val.aviso { color: var(--warning); }
  .desgaste-val.peligro { color: var(--danger); }
  .desgaste-ohm { font-size: 14px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .progress-bar { width: 100%; height: 12px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
    transition: width 0.5s ease; width: 0%;
  }
  .progress-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }

  .log { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; height: 160px; overflow-y: auto; font-family: 'Space Mono', monospace; font-size: 12px; margin-bottom: 12px; }
  .log-entry { padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: var(--muted); font-size: 10px; }
  .log-val-piezo { color: var(--accent2); font-weight: 700; }
  .log-val-desgaste { color: var(--accent3); font-weight: 700; }
  .log-val-aviso { color: var(--warning); font-weight: 700; }
  .log-val-peligro { color: var(--danger); font-weight: 700; }
  .log-empty { color: var(--muted); text-align: center; padding: 20px 0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Sensor Monitor</h1>
    <p>ESP32-Nucleo · BLE · Web Bluetooth</p>
  </header>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Desconectado</span>
  </div>

  <button class="btn btn-connect" id="btn-connect" onclick="conectar()">Conectar al ESP32-Nucleo</button>
  <button class="btn btn-disconnect" id="btn-disconnect" style="display:none" onclick="desconectar()">Desconectar</button>

  <!-- ALERTA -->
  <div class="alerta-banner" id="alerta-banner">⚠️ —</div>

  <!-- PIEZO -->
  <div class="section-title">Piezo</div>
  <div class="live-value" id="live-box">
    <div class="live-label">Valor actual</div>
    <div class="live-number" id="live-num">—</div>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Lecturas</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
    <div class="stat-card highlight">
      <div class="stat-label">Máximo</div>
      <div class="stat-value" id="stat-max">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mediana</div>
      <div class="stat-value" id="stat-med">—</div>
    </div>
  </div>

  <!-- DESGASTE -->
  <div class="section-title">Desgaste</div>
  <div class="desgaste-card" id="desgaste-card">
    <div class="desgaste-row">
      <div>
        <div class="desgaste-label">Porcentaje</div>
        <div class="desgaste-val" id="desgaste-pct">—</div>
      </div>
      <div style="text-align:right">
        <div class="desgaste-label">Resistencia</div>
        <div class="desgaste-ohm" id="desgaste-ohm">—</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-labels">
      <span>0%</span>
      <span>50% ⚠️</span>
      <span>75% 🚨</span>
      <span>100%</span>
    </div>
  </div>

  <!-- LOG -->
  <div class="section-title">Historial</div>
  <div class="log" id="log">
    <div class="log-empty">Sin datos aún...</div>
  </div>

  <button class="btn btn-clear" onclick="limpiar()">Limpiar datos</button>
</div>

<script>
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const CHAR_TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let device, characteristic;
let datosPiezo = [];
let buffer = '';

async function conectar() {
  try {
    setStatus('Buscando...', '');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'ESP32-Nucleo' }],
      optionalServices: [SERVICE_UUID]
    });
    setStatus('Conectando...', '');
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_TX_UUID);
    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', onDato);
    device.addEventListener('gattserverdisconnected', onDesconectado);
    setStatus('Conectado a ' + device.name, 'connected');
    document.getElementById('btn-connect').style.display = 'none';
    document.getElementById('btn-disconnect').style.display = 'block';
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

function onDato(event) {
  const decoder = new TextDecoder();
  buffer += decoder.decode(event.target.value);
  const lineas = buffer.split('\n');
  buffer = lineas.pop();
  lineas.forEach(linea => {
    linea = linea.trim();
    if (!linea) return;
    if (linea.startsWith('PIEZO:')) {
      const valor = parseInt(linea.replace('PIEZO:', ''));
      if (!isNaN(valor) && valor > 0) procesarPiezo(valor);
    } else if (linea.startsWith('DESGASTE:')) {
      const partes = linea.replace('DESGASTE:', '').split(' ');
      const ohm = parseFloat(partes[0]);
      const pct = parseFloat(partes[1]);
      if (!isNaN(ohm) && !isNaN(pct)) procesarDesgaste(ohm, pct);
    } else if (linea.startsWith('ALERTA:')) {
      const tipo = linea.replace('ALERTA:', '').trim();
      mostrarAlerta(tipo);
    }
  });
}

function procesarPiezo(valor) {
  datosPiezo.push(valor);
  const ahora = new Date().toTimeString().slice(0,8);
  const liveNum = document.getElementById('live-num');
  const liveBox = document.getElementById('live-box');
  liveNum.textContent = valor;
  liveBox.classList.add('active');
  setTimeout(() => liveBox.classList.remove('active'), 300);
  const max = Math.max(...datosPiezo);
  if (valor === max) { liveNum.classList.add('peak'); setTimeout(() => liveNum.classList.remove('peak'), 500); }
  document.getElementById('stat-count').textContent = datosPiezo.length;
  document.getElementById('stat-max').textContent = max;
  document.getElementById('stat-med').textContent = mediana(datosPiezo);
  addLog(ahora, 'PIEZO: ' + valor, 'piezo');
}

function procesarDesgaste(ohm, pct) {
  const ahora = new Date().toTimeString().slice(0,8);
  const pctEl = document.getElementById('desgaste-pct');
  const card = document.getElementById('desgaste-card');

  document.getElementById('desgaste-ohm').textContent = ohm.toFixed(1) + ' Ω';
  pctEl.textContent = pct.toFixed(1) + '%';
  document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';

  // Colores según nivel
  pctEl.className = 'desgaste-val';
  card.className = 'desgaste-card';
  if (pct >= 75) { pctEl.classList.add('peligro'); card.classList.add('peligro'); }
  else if (pct >= 50) { pctEl.classList.add('aviso'); card.classList.add('aviso'); }

  addLog(ahora, 'DESGASTE: ' + pct.toFixed(1) + '%', 'desgaste');
}

function mostrarAlerta(tipo) {
  const banner = document.getElementById('alerta-banner');
  const ahora = new Date().toTimeString().slice(0,8);
  banner.className = 'alerta-banner';
  if (tipo === 'PELIGRO') {
    banner.classList.add('peligro');
    banner.textContent = '🚨 PELIGRO — Sensor al límite, cambiar inmediatamente';
    addLog(ahora, '🚨 PELIGRO', 'peligro');
  } else if (tipo === 'AVISO') {
    banner.classList.add('aviso');
    banner.textContent = '⚠️ AVISO — Cambiar el sensor pronto';
    addLog(ahora, '⚠️ AVISO', 'aviso');
  }
}

function addLog(hora, texto, tipo) {
  const log = document.getElementById('log');
  const empty = log.querySelector('.log-empty');
  if (empty) empty.remove();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${hora}</span><span class="log-val-${tipo}">${texto}</span>`;
  log.insertBefore(entry, log.firstChild);
  if (log.children.length > 80) log.removeChild(log.lastChild);
}

function mediana(arr) {
  if (!arr.length) return '—';
  const sorted = [...arr].sort((a,b) => a-b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 === 0 ? Math.round((sorted[mid-1] + sorted[mid]) / 2) : sorted[mid];
}

function desconectar() {
  if (device && device.gatt.connected) device.gatt.disconnect();
  onDesconectado();
}

function onDesconectado() {
  setStatus('Desconectado', '');
  document.getElementById('btn-connect').style.display = 'block';
  document.getElementById('btn-disconnect').style.display = 'none';
  document.getElementById('live-num').textContent = '—';
}

function limpiar() {
  datosPiezo = [];
  document.getElementById('stat-count').textContent = '0';
  document.getElementById('stat-max').textContent = '—';
  document.getElementById('stat-med').textContent = '—';
  document.getElementById('live-num').textContent = '—';
  document.getElementById('desgaste-pct').textContent = '—';
  document.getElementById('desgaste-ohm').textContent = '—';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('alerta-banner').className = 'alerta-banner';
  document.getElementById('log').innerHTML = '<div class="log-empty">Sin datos aún...</div>';
}

function setStatus(msg, state) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state ? ' ' + state : '');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piezo Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; }

  header { margin-bottom: 32px; }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e2e8f0, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--muted); font-size: 13px; margin-top: 4px; font-family: 'Space Mono', monospace; }

  .btn {
    width: 100%;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .btn-connect {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn-connect:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-disconnect {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
  }
  .btn-disconnect:hover { background: rgba(239,68,68,0.08); }

  .btn-clear {
    background: transparent;
    color: var(--muted);
    border-color: var(--border);
    font-size: 13px;
    padding: 10px;
  }
  .btn-clear:hover { border-color: var(--muted); color: var(--text); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  .dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat-card.highlight { border-color: var(--accent); }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    font-family: 'Space Mono', monospace;
  }
  .stat-card.highlight .stat-value { color: var(--accent2); }

  .live-value {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .live-value::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .live-value.active::before { transform: scaleX(1); }
  .live-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .live-number {
    font-size: 56px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    transition: color 0.2s;
    line-height: 1;
  }
  .live-number.peak { color: var(--accent2); }

  .log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    height: 200px;
    overflow-y: auto;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    margin-bottom: 12px;
  }
  .log-entry {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform:none; } }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: var(--muted); font-size: 10px; }
  .log-val { color: var(--accent2); font-weight: 700; }
  .log-empty { color: var(--muted); text-align: center; padding: 20px 0; }

  .warning {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #fca5a5;
    margin-bottom: 16px;
    font-family: 'Space Mono', monospace;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Piezo Monitor</h1>
    <p>ESP32-Nucleo · BLE · Web Bluetooth</p>
  </header>

  <div class="warning" id="warning" style="display:none">
    ⚠ Web Bluetooth no está disponible en Safari/iOS. Usa <strong>Bluefy</strong> (App Store, gratis) para abrir esta página.
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Desconectado</span>
  </div>

  <button class="btn btn-connect" id="btn-connect" onclick="conectar()">Conectar al ESP32-Nucleo</button>
  <button class="btn btn-disconnect" id="btn-disconnect" style="display:none" onclick="desconectar()">Desconectar</button>

  <div class="live-value" id="live-box">
    <div class="live-label">Valor actual</div>
    <div class="live-number" id="live-num">—</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Lecturas</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
    <div class="stat-card highlight">
      <div class="stat-label">Máximo</div>
      <div class="stat-value" id="stat-max">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mediana</div>
      <div class="stat-value" id="stat-med">—</div>
    </div>
  </div>

  <div class="log" id="log">
    <div class="log-empty">Sin datos aún...</div>
  </div>

  <button class="btn btn-clear" onclick="limpiar()">Limpiar datos</button>
</div>

<script>
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const CHAR_TX_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let device, characteristic;
let datos = [];
let buffer = '';

function checkBluetooth() {
  if (!navigator.bluetooth) {
    document.getElementById('warning').style.display = 'block';
    document.getElementById('btn-connect').disabled = true;
  }
}

async function conectar() {
  try {
    setStatus('Buscando...', '');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'ESP32-Nucleo' }],
      optionalServices: [SERVICE_UUID]
    });
    setStatus('Conectando...', '');
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_TX_UUID);
    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', onDato);
    device.addEventListener('gattserverdisconnected', onDesconectado);

    setStatus('Conectado a ' + device.name, 'connected');
    document.getElementById('btn-connect').style.display = 'none';
    document.getElementById('btn-disconnect').style.display = 'block';
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

function onDato(event) {
  const decoder = new TextDecoder();
  buffer += decoder.decode(event.target.value);
  const lineas = buffer.split('\n');
  buffer = lineas.pop();
  lineas.forEach(linea => {
    linea = linea.trim();
    if (!linea) return;
    let valor = null;
    if (linea.startsWith('PIEZO:')) {
      valor = parseInt(linea.replace('PIEZO:', ''));
    } else if (!isNaN(parseInt(linea))) {
      valor = parseInt(linea);
    }
    if (valor !== null && valor > 0) {
      procesarValor(valor);
    }
  });
}

function procesarValor(valor) {
  datos.push(valor);
  const ahora = new Date();
  const hora = ahora.toTimeString().slice(0,8);

  // Actualizar live
  const liveNum = document.getElementById('live-num');
  const liveBox = document.getElementById('live-box');
  liveNum.textContent = valor;
  liveBox.classList.add('active');
  setTimeout(() => liveBox.classList.remove('active'), 300);

  const max = Math.max(...datos);
  if (valor === max) {
    liveNum.classList.add('peak');
    setTimeout(() => liveNum.classList.remove('peak'), 500);
  }

  // Stats
  document.getElementById('stat-count').textContent = datos.length;
  document.getElementById('stat-max').textContent = max;
  document.getElementById('stat-med').textContent = mediana(datos);

  // Log
  const log = document.getElementById('log');
  const empty = log.querySelector('.log-empty');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${hora}</span><span class="log-val">${valor}</span>`;
  log.insertBefore(entry, log.firstChild);

  if (log.children.length > 50) log.removeChild(log.lastChild);
}

function mediana(arr) {
  if (!arr.length) return '—';
  const sorted = [...arr].sort((a,b) => a-b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 === 0
    ? Math.round((sorted[mid-1] + sorted[mid]) / 2)
    : sorted[mid];
}

function desconectar() {
  if (device && device.gatt.connected) device.gatt.disconnect();
  onDesconectado();
}

function onDesconectado() {
  setStatus('Desconectado', '');
  document.getElementById('btn-connect').style.display = 'block';
  document.getElementById('btn-disconnect').style.display = 'none';
  document.getElementById('live-num').textContent = '—';
}

function limpiar() {
  datos = [];
  document.getElementById('stat-count').textContent = '0';
  document.getElementById('stat-max').textContent = '—';
  document.getElementById('stat-med').textContent = '—';
  document.getElementById('live-num').textContent = '—';
  document.getElementById('log').innerHTML = '<div class="log-empty">Sin datos aún...</div>';
}

function setStatus(msg, state) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state ? ' ' + state : '');
}

checkBluetooth();
</script>
</body>
</html>
